name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write   # GitHub → Azure OIDC (for ACR push)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # ── Project-specific names ────────────────────────────────────────────────
  # Derived from the Terraform `project` variable (default: igormcplab).
  # Update here if you rename the project. ACI_FQDN is intentionally absent —
  # it is read dynamically from Azure so it is always correct regardless of
  # which region the infrastructure is deployed to.
  RESOURCE_GROUP: rg-igormcplab
  ACI_NAME: aci-igormcplab
  IMAGE_REPO: igormcplab
  TF_WORKSPACE_URL: https://app.terraform.io/app/gitIgorrz/workspaces/igor-mcp-lab

jobs:
  # ── Gate 1: tests must pass before image is pushed ─────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test:built

  # ── Pre-flight: wait for ACR, then read ACI FQDN ─────────────────────────
  # GitHub Actions fires simultaneously with the HCP TF VCS trigger. On a
  # fresh deploy, HCP TF may still be applying (waiting for your plan approval)
  # when this job runs. We poll for the ACR — not just the resource group —
  # because the Docker push needs ACR specifically.
  #
  # Retry logic (every 30s, up to 10 minutes):
  #   - Covers the race condition where Terraform is mid-apply
  #   - If ACR still isn't found after 10 min, infrastructure is genuinely
  #     not deployed (post-destroy), so we skip with a notice
  #
  # Note: if your HCP TF plan approval takes longer than 10 minutes, the
  # Docker push will be skipped and you'll need to re-run this workflow
  # manually after the Terraform apply completes.
  check-infra:
    name: Check infrastructure
    runs-on: ubuntu-latest
    needs: test
    outputs:
      deployed: ${{ steps.check.outputs.deployed }}
      aci_fqdn: ${{ steps.check.outputs.aci_fqdn }}
    steps:
      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Wait for ACR and read ACI FQDN
        id: check
        run: |
          # Poll for the ACR (not just the RG) — we need ACR to push the image.
          # Retry every 30s for up to 10 minutes to handle the parallel
          # HCP TF apply race condition on fresh deploys.
          MAX_ATTEMPTS=20
          ATTEMPT=0
          ACR_NAME=""

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            ACR_NAME=$(az acr list \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --query "[0].name" -o tsv 2>/dev/null || echo "")

            if [ -n "$ACR_NAME" ]; then
              echo "ACR found: $ACR_NAME (attempt $ATTEMPT)"
              break
            fi

            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: ACR not found yet, waiting 30s..."
            sleep 30
          done

          if [ -z "$ACR_NAME" ]; then
            echo "deployed=false" >> "$GITHUB_OUTPUT"
            echo "aci_fqdn=" >> "$GITHUB_OUTPUT"
            echo "::notice::ACR not found in '${{ env.RESOURCE_GROUP }}' after $((MAX_ATTEMPTS * 30))s. Infrastructure is not deployed or the HCP TF apply is still pending approval. Re-run this workflow after the Terraform apply completes."
            exit 0
          fi

          echo "deployed=true" >> "$GITHUB_OUTPUT"
          # Read the FQDN directly from Azure — works regardless of region
          FQDN=$(az container show \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --name "${{ env.ACI_NAME }}" \
            --query "ipAddress.fqdn" -o tsv 2>/dev/null || echo "")
          echo "aci_fqdn=$FQDN" >> "$GITHUB_OUTPUT"

  # ── Build & push Docker image to ACR ──────────────────────────────────────
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test, check-infra]
    if: needs.check-infra.outputs.deployed == 'true'
    outputs:
      acr_login_server: ${{ steps.acr.outputs.login_server }}
    steps:
      - uses: actions/checkout@v5

      - name: Login to Azure (GitHub → Azure OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR name and login
        id: acr
        run: |
          ACR_NAME=$(az acr list --resource-group "${{ env.RESOURCE_GROUP }}" --query '[0].name' -o tsv)
          LOGIN_SERVER=$(az acr list --resource-group "${{ env.RESOURCE_GROUP }}" --query '[0].loginServer' -o tsv)
          az acr login --name "$ACR_NAME"
          echo "login_server=$LOGIN_SERVER" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.acr.outputs.login_server }}/${{ env.IMAGE_REPO }}:${{ github.sha }}
            ${{ steps.acr.outputs.login_server }}/${{ env.IMAGE_REPO }}:latest
          cache-from: type=registry,ref=${{ steps.acr.outputs.login_server }}/${{ env.IMAGE_REPO }}:cache
          cache-to: type=registry,ref=${{ steps.acr.outputs.login_server }}/${{ env.IMAGE_REPO }}:cache,mode=max

  # ── Restart ACI to pick up the new image ──────────────────────────────────
  restart-and-verify:
    name: Restart & Smoke Test
    runs-on: ubuntu-latest
    needs: [check-infra, build-push]
    if: needs.check-infra.outputs.deployed == 'true'
    steps:
      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Restart ACI
        run: |
          # az container restart returns HTTP 200 OK but the CLI treats it as
          # an error — suppress the false negative, health poll confirms success.
          az container restart \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --name "${{ env.ACI_NAME }}" || true

      - name: Wait for MCP server healthy (120s timeout)
        run: |
          HEALTH_URL="http://${{ needs.check-infra.outputs.aci_fqdn }}:3000/health"
          echo "Polling $HEALTH_URL"
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
            echo "Attempt $i/24: HTTP $STATUS"
            [ "$STATUS" = "200" ] && { echo "Server healthy."; exit 0; }
            sleep 5
          done
          echo "ERROR: server not healthy after 120s" && exit 1

      - name: Smoke test — tools/list
        run: |
          RESPONSE=$(curl -s -X POST "http://${{ needs.check-infra.outputs.aci_fqdn }}:3000/mcp" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}')
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"echo"' || { echo "FAIL: echo tool missing"; exit 1; }
          echo "$RESPONSE" | grep -q '"add"'  || { echo "FAIL: add tool missing";  exit 1; }
          echo "tools/list passed."

      - name: Smoke test — echo invocation
        run: |
          RESPONSE=$(curl -s -X POST "http://${{ needs.check-infra.outputs.aci_fqdn }}:3000/mcp" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"echo","arguments":{"text":"ping"}}}')
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"ping"' || { echo "FAIL: unexpected echo response"; exit 1; }
          echo "echo invocation passed."

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ needs.build-push.outputs.acr_login_server }}/${{ env.IMAGE_REPO }}:${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Health | http://${{ needs.check-infra.outputs.aci_fqdn }}:3000/health |" >> "$GITHUB_STEP_SUMMARY"
          echo "| HCP TF | ${{ env.TF_WORKSPACE_URL }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GHA run | https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }} |" >> "$GITHUB_STEP_SUMMARY"
