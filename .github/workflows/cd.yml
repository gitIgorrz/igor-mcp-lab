name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write   # GitHub → Azure OIDC (for ACR push)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Gate 1: tests must pass before image is pushed ─────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test:built

  # ── Build & push Docker image to ACR ──────────────────────────────────────
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      acr_login_server: ${{ steps.acr.outputs.login_server }}
    steps:
      - uses: actions/checkout@v5

      - name: Login to Azure (GitHub → Azure OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR login server
        id: acr
        run: |
          echo "login_server=$(az acr list --resource-group rg-igormcplab --query '[0].loginServer' -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Login to ACR
        run: az acr login --name "$(az acr list --resource-group rg-igormcplab --query '[0].name' -o tsv)"

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.acr.outputs.login_server }}/igormcplab:${{ github.sha }}
            ${{ steps.acr.outputs.login_server }}/igormcplab:latest
          cache-from: type=registry,ref=${{ steps.acr.outputs.login_server }}/igormcplab:cache
          cache-to: type=registry,ref=${{ steps.acr.outputs.login_server }}/igormcplab:cache,mode=max

  # ── Restart ACI to pick up the new image ──────────────────────────────────
  # Terraform (managed by HCP TF via VCS) keeps the infrastructure stable.
  # GitHub Actions only restarts the container to deploy new code.
  restart-and-verify:
    name: Restart & Smoke Test
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Restart ACI
        run: |
          # az container restart returns HTTP 200 OK but the CLI treats it as
          # an error — suppress the false negative, health poll confirms success.
          az container restart \
            --resource-group rg-igormcplab \
            --name aci-igormcplab || true

      - name: Wait for MCP server healthy (120s timeout)
        run: |
          HEALTH_URL="http://mcp-igormcplab.eastus.azurecontainer.io:3000/health"
          echo "Polling $HEALTH_URL"
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
            echo "Attempt $i/24: HTTP $STATUS"
            [ "$STATUS" = "200" ] && { echo "Server healthy."; exit 0; }
            sleep 5
          done
          echo "ERROR: server not healthy after 120s" && exit 1

      - name: Smoke test — tools/list
        run: |
          RESPONSE=$(curl -s -X POST "http://mcp-igormcplab.eastus.azurecontainer.io:3000/mcp" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}')
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"echo"' || { echo "FAIL: echo tool missing"; exit 1; }
          echo "$RESPONSE" | grep -q '"add"'  || { echo "FAIL: add tool missing";  exit 1; }
          echo "tools/list passed."

      - name: Smoke test — echo invocation
        run: |
          RESPONSE=$(curl -s -X POST "http://mcp-igormcplab.eastus.azurecontainer.io:3000/mcp" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"echo","arguments":{"text":"ping"}}}')
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"ping"' || { echo "FAIL: unexpected echo response"; exit 1; }
          echo "echo invocation passed."

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ needs.build-push.outputs.acr_login_server }}/igormcplab:${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Health | http://mcp-igormcplab.eastus.azurecontainer.io:3000/health |" >> "$GITHUB_STEP_SUMMARY"
          echo "| HCP TF | https://app.terraform.io/app/gitIgorrz/workspaces/igor-mcp-lab |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GHA run | https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }} |" >> "$GITHUB_STEP_SUMMARY"
