name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write   # OIDC to Azure (for ACR push) and to HCP Terraform

env:
  TF_CLOUD_ORGANIZATION: gitIgorrz
  TF_WORKSPACE: igor-mcp-lab

jobs:
  # ── Gate 1: all tests must pass before any infra changes ──────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test:built

  # ── Bootstrap: provision ACR and supporting infra (no ACI yet) ────────────
  bootstrap:
    name: "HCP Terraform: Bootstrap infra"
    runs-on: ubuntu-latest
    needs: test
    env:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
    outputs:
      run_id: ${{ steps.create-run.outputs.run_id }}
      configuration_version_id: ${{ steps.upload.outputs.configuration_version_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Upload Terraform configuration
        id: upload
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.2
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          directory: infra

      - name: Create HCP TF run (bootstrap — ACR only)
        id: create-run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.2
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          configuration_version: ${{ steps.upload.outputs.configuration_version_id }}
          message: "Bootstrap: create ACR — ${{ github.sha }}"
          variables: |
            [
              {"key": "create_aci", "value": "false", "category": "terraform", "sensitive": false},
              {"key": "image_tag",  "value": "bootstrap", "category": "terraform", "sensitive": false}
            ]

      - name: Apply bootstrap run
        uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.3.2
        with:
          run: ${{ steps.create-run.outputs.run_id }}
          comment: "Auto-approved: bootstrap phase (no ACI) — ${{ github.sha }}"

  # ── Read ACR outputs from HCP TF state ─────────────────────────────────────
  read-outputs:
    name: Read Terraform outputs
    runs-on: ubuntu-latest
    needs: bootstrap
    outputs:
      acr_name: ${{ steps.tf-out.outputs.acr_name }}
      acr_login_server: ${{ steps.tf-out.outputs.acr_login_server }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Terraform Init (to access remote state)
        working-directory: infra
        run: terraform init

      - name: Read ACR outputs from HCP TF state
        id: tf-out
        working-directory: infra
        run: |
          echo "acr_name=$(terraform output -raw acr_name)" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> "$GITHUB_OUTPUT"

  # ── Build & push Docker image to ACR (Azure OIDC from GitHub Actions) ──────
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: read-outputs
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure (OIDC — GitHub → Azure federated credential)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name "${{ needs.read-outputs.outputs.acr_name }}"

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ needs.read-outputs.outputs.acr_login_server }}/igormcplab:${{ github.sha }}
            ${{ needs.read-outputs.outputs.acr_login_server }}/igormcplab:latest
          cache-from: type=registry,ref=${{ needs.read-outputs.outputs.acr_login_server }}/igormcplab:cache
          cache-to: type=registry,ref=${{ needs.read-outputs.outputs.acr_login_server }}/igormcplab:cache,mode=max

  # ── Deploy ACI via HCP Terraform (Dynamic Provider Credentials) ────────────
  deploy:
    name: "HCP Terraform: Deploy ACI"
    runs-on: ubuntu-latest
    needs: [read-outputs, build-push]
    environment: production
    outputs:
      run_id: ${{ steps.create-run.outputs.run_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Upload Terraform configuration
        id: upload
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.2
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          directory: infra
        env:
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
          TF_CLOUD_ORGANIZATION: ${{ env.TF_CLOUD_ORGANIZATION }}

      - name: Create HCP TF plan (deploy ACI with new image)
        id: create-run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.2
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          configuration_version: ${{ steps.upload.outputs.configuration_version_id }}
          message: "Deploy: ${{ github.sha }}"
          variables: |
            [
              {"key": "create_aci", "value": "true",                    "category": "terraform", "sensitive": false},
              {"key": "image_tag",  "value": "${{ github.sha }}",       "category": "terraform", "sensitive": false}
            ]
        env:
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
          TF_CLOUD_ORGANIZATION: ${{ env.TF_CLOUD_ORGANIZATION }}

      - name: Show plan output
        uses: hashicorp/tfc-workflows-github/actions/plan-output@v1.3.2
        with:
          plan: ${{ fromJSON(steps.create-run.outputs.payload).data.relationships.plan.data.id }}
        env:
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
          TF_CLOUD_ORGANIZATION: ${{ env.TF_CLOUD_ORGANIZATION }}

      # ── Gate 2: tests must pass before apply is triggered ─────────────────
      - name: Re-run tests (gate before apply)
        run: |
          npm ci
          npm run test:built

      - name: Apply deploy run
        uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.3.2
        with:
          run: ${{ steps.create-run.outputs.run_id }}
          comment: "Tests passed — applying deploy for ${{ github.sha }}"
        env:
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
          TF_CLOUD_ORGANIZATION: ${{ env.TF_CLOUD_ORGANIZATION }}

  # ── Health check + smoke tests ─────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [read-outputs, deploy]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Read health and MCP endpoint URLs
        id: endpoints
        working-directory: infra
        run: |
          echo "health_url=$(terraform output -raw mcp_health_url)" >> "$GITHUB_OUTPUT"
          echo "mcp_url=$(terraform output -raw mcp_endpoint_url)" >> "$GITHUB_OUTPUT"

      - name: Wait for MCP server healthy (120s timeout)
        run: |
          HEALTH_URL="${{ steps.endpoints.outputs.health_url }}"
          echo "Polling $HEALTH_URL"
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
            echo "Attempt $i/24: HTTP $STATUS"
            [ "$STATUS" = "200" ] && { echo "Server healthy."; exit 0; }
            sleep 5
          done
          echo "ERROR: server not healthy after 120s" && exit 1

      - name: Smoke test — tools/list
        run: |
          RESPONSE=$(curl -s -X POST "${{ steps.endpoints.outputs.mcp_url }}" \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}')
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"echo"'   || { echo "FAIL: echo tool missing";   exit 1; }
          echo "$RESPONSE" | grep -q '"add"'    || { echo "FAIL: add tool missing";    exit 1; }
          echo "Smoke test passed — all expected tools registered."

      - name: Smoke test — echo tool invocation
        run: |
          RESPONSE=$(curl -s -X POST "${{ steps.endpoints.outputs.mcp_url }}" \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"echo","arguments":{"text":"ping"}}}')
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"ping"' || { echo "FAIL: echo returned unexpected response"; exit 1; }
          echo "Echo tool smoke test passed."

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Health URL | ${{ steps.endpoints.outputs.health_url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| MCP endpoint | ${{ steps.endpoints.outputs.mcp_url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| HCP TF workspace | https://app.terraform.io/app/${{ env.TF_CLOUD_ORGANIZATION }}/workspaces/${{ env.TF_WORKSPACE }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GHA run | https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }} |" >> "$GITHUB_STEP_SUMMARY"
