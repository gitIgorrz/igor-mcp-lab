name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test:built
# HCP Terraform handles speculative plans for PRs automatically via the
# VCS connection — no GitHub Actions steps needed for Terraform.
